version: 2

project_name: gdproto

before:
  hooks:
    - go mod tidy

builds:
  - id: gdproto
    main: ./cmd/gdproto
    binary: gdproto
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/cafecito-games/gdproto/internal/cli.Version={{ .Version }}

  - id: protoc-gen-gdscript
    main: ./cmd/protoc-gen-gdscript
    binary: protoc-gen-gdscript
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/cafecito-games/gdproto/internal/cli.Version={{ .Version }}

archives:
  - id: gdproto
    ids:
      - gdproto
      - protoc-gen-gdscript
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

homebrew_casks:
  - name: gdproto
    repository:
      owner: cafecito-games
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/cafecito-games/gdproto"
    description: "Protocol Buffers v3 to GDScript (Godot 4.6+) compiler"
    # The release binaries are not code-signed, so strip the quarantine
    # attribute on install to avoid Gatekeeper blocking the executables.
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/gdproto"]
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/protoc-gen-gdscript"]
          end
