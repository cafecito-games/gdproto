syntax = "proto3";

package fixture;

// AllScalars exercises every proto3 scalar type plus a packed-repeated
// numeric so the wire-format and text-format paths get covered for each.
message AllScalars {
  int32 v_int32 = 1;
  int64 v_int64 = 2;
  uint32 v_uint32 = 3;
  uint64 v_uint64 = 4;
  sint32 v_sint32 = 5;
  sint64 v_sint64 = 6;
  fixed32 v_fixed32 = 7;
  fixed64 v_fixed64 = 8;
  sfixed32 v_sfixed32 = 9;
  sfixed64 v_sfixed64 = 10;
  float v_float = 11;
  double v_double = 12;
  bool v_bool = 13;
  string v_string = 14;
  bytes v_bytes = 15;

  // Packed repeated numeric — proto3 default for primitives.
  repeated int32 packed_ints = 16;
}
