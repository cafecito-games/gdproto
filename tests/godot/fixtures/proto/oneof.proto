syntax = "proto3";

package fixture;

enum Outcome {
  OUTCOME_UNSPECIFIED = 0;
  OUTCOME_WIN = 1;
  OUTCOME_LOSS = 2;
}

message OneofPayload {
  string note = 1;
}

message OneofHost {
  oneof choice {
    int32 number = 1;
    string text = 2;
    OneofPayload payload = 3;
    Outcome outcome = 4;
  }
}
