name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Semver component to bump'
        required: true
        default: 'minor'
        type: choice
        options:
          - major
          - minor
          - patch

permissions:
  contents: write

jobs:
  tag:
    name: Create release tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute and validate next version
        id: version
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          set -euo pipefail

          case "$BUMP" in
            major|minor|patch) ;;
            *) echo "Invalid bump type: $BUMP" >&2; exit 1 ;;
          esac

          latest=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V \
            | tail -n1 || true)

          if [ -z "$latest" ]; then
            current="0.0.0"
            echo "No existing semver tag found; starting from $current"
          else
            current="${latest#v}"
            echo "Latest tag: $latest"
          fi

          IFS='.' read -r major minor patch <<<"$current"

          case "$BUMP" in
            major) next_major=$((major + 1)); next_minor=0; next_patch=0 ;;
            minor) next_major=$major; next_minor=$((minor + 1)); next_patch=0 ;;
            patch) next_major=$major; next_minor=$minor; next_patch=$((patch + 1)) ;;
          esac

          next="v${next_major}.${next_minor}.${next_patch}"
          echo "Next version: $next"

          if git rev-parse -q --verify "refs/tags/$next" >/dev/null; then
            echo "Tag $next already exists" >&2
            exit 1
          fi

          echo "tag=$next" >>"$GITHUB_OUTPUT"
          echo "previous=${latest:-none}" >>"$GITHUB_OUTPUT"

      - name: Create and push tag
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          PREVIOUS: ${{ steps.version.outputs.previous }}
        run: |
          set -euo pipefail
          if [ "$PREVIOUS" = "none" ]; then
            gh release create "$TAG" --title "$TAG" --generate-notes
          else
            gh release create "$TAG" --title "$TAG" --generate-notes --notes-start-tag "$PREVIOUS"
          fi
