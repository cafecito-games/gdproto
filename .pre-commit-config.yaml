default_install_hook_types: [pre-commit]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(examples/|internal/generator/).*\.gd$
      - id: end-of-file-fixer
        exclude: ^(examples/|internal/generator/).*\.gd$
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=512]
        exclude: ^website/package-lock\.json$
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: task-fmt-check
        name: task fmt:check
        entry: task fmt:check
        language: system
        types: [go]
        pass_filenames: false

      - id: task-lint
        name: task lint
        entry: task lint
        language: system
        types: [go]
        pass_filenames: false

      - id: task-test
        name: task test (fast)
        entry: task test
        language: system
        types: [go]
        pass_filenames: false
        stages: [pre-commit]
